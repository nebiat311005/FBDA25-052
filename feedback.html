<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eritrea | Feedback</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Simple Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Eritrea</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="history.html">History</a></li>
          <li class="nav-item"><a class="nav-link" href="culture.html">Culture</a></li>
          <li class="nav-item"><a class="nav-link" href="resilience.html">Resilience</a></li>
          <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
          <li class="nav-item"><a class="nav-link active" href="feedback.html">Feedback</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h1 class="text-center mb-4">Feedback</h1>
    <p class="text-center mb-4">Please give your feedback about this website. Thank you!</p>

    <div class="row justify-content-center">
      <div class="col-lg-7">
        <form id="feedback-form" class="card p-4">
          
          <div class="mb-3">
            <label class="form-label">Your Name</label>
            <input type="text" id="name" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Your Email</label>
            <input type="email" id="email" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Topic</label>
            <select id="topic" class="form-select" required>
              <option value="">Select topic...</option>
              <option value="content">Content</option>
              <option value="design">Design</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Your Feedback / Message</label>
            <textarea id="message" class="form-control" rows="5" required></textarea>
          </div>

          <div class="mb-3 form-check">
            <input type="checkbox" id="consent" class="form-check-input" required>
            <label class="form-check-label" for="consent">
              I understand this is a student assignment project.
            </label>
          </div>

          <button type="submit" class="btn btn-primary w-100">Submit Feedback</button>
          <p id="form-status" class="mt-3 text-center fw-bold"></p>
        </form>
      </div>
    </div>
  </div>

  <!-- Simple Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
      <p>&copy; <span id="year"></span> Eritrea Showcase Website</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
